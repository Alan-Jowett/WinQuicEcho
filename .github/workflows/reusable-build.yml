name: Reusable Build

# SPDX-License-Identifier: MIT
# Copyright (c) 2026 WinQuicEcho contributors

on:
  workflow_call:
    inputs:
      build_dir:
        required: false
        type: string
        default: build
      artifact_name:
        required: false
        type: string
        default: build-artifacts
      config:
        required: false
        type: string
        default: Release
      repository:
        required: false
        type: string
        default: ''
      ref:
        required: false
        type: string
        default: ''

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository (explicit ref)
        if: ${{ inputs.ref != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}

      - name: Checkout repository (default ref)
        if: ${{ inputs.ref == '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository || github.repository }}

      - name: Configure CMake
        run: cmake -S . -B ${{ inputs.build_dir }} -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build ${{ inputs.build_dir }} --config ${{ inputs.config }} --parallel

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Download WDK and SDK NuGet packages
        shell: pwsh
        run: |
          $wdkVersion = '10.0.26100.6584'
          $sdkVersion = '10.0.26100.1'
          $nugetDir = 'nuget'

          nuget install Microsoft.Windows.WDK.x64 -Version $wdkVersion -OutputDirectory $nugetDir -Verbosity quiet
          if ($LASTEXITCODE -ne 0) { throw "WDK NuGet install failed with exit code $LASTEXITCODE" }
          nuget install Microsoft.Windows.SDK.CPP -Version $sdkVersion -OutputDirectory $nugetDir -Verbosity quiet
          if ($LASTEXITCODE -ne 0) { throw "SDK NuGet install failed with exit code $LASTEXITCODE" }

          $wdkBase = (Get-ChildItem $nugetDir -Directory -Filter 'Microsoft.Windows.WDK*' | Select-Object -First 1).FullName
          if (-not $wdkBase) { throw "WDK NuGet package directory not found in $nugetDir" }
          $wdkVer = (Get-ChildItem "$wdkBase\c\Include" -Directory | Select-Object -First 1).Name

          # Set environment variables so MSBuild's WindowsDriver targets find the WDK.
          echo "WDKContentRoot=$wdkBase\c" >> $env:GITHUB_ENV
          echo "WDKToolRoot=$wdkBase\c" >> $env:GITHUB_ENV
          echo "NUGET_WDK_BASE=$wdkBase" >> $env:GITHUB_ENV
          echo "NUGET_WDK_VER=$wdkVer" >> $env:GITHUB_ENV
          Write-Host "WDK content root: $wdkBase\c (version $wdkVer)"

          # The WDK NuGet package doesn't ship rc.exe/mc.exe but MSBuild
          # resolves them relative to the WDK path. Copy from the system SDK.
          foreach ($arch in @('x86','x64')) {
            $wdkBin = "$wdkBase\c\bin\$wdkVer\$arch"
            if (-not (Test-Path $wdkBin)) { New-Item -ItemType Directory -Path $wdkBin -Force | Out-Null }
            $sdkBin = "C:\Program Files (x86)\Windows Kits\10\bin\$wdkVer\$arch"
            if (-not (Test-Path $sdkBin)) {
              $sdkBin = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Directory |
                Where-Object { $_.Name -match '^\d+\.' } | Sort-Object Name -Descending |
                Select-Object -First 1).FullName + "\$arch"
            }
            if (-not (Test-Path $sdkBin)) {
              throw "Windows SDK bin directory not found for $arch (tried $sdkBin)"
            }
            foreach ($tool in @('rc.exe','rcdll.dll','mc.exe')) {
              $src = Join-Path $sdkBin $tool
              if (-not (Test-Path $src)) {
                throw "Required SDK tool not found: $src"
              }
              Copy-Item $src -Destination $wdkBin -Force
            }
            Write-Host "Populated $wdkBin with SDK tools"
          }

      - name: Download msquicpriv.sys (kernel-mode)
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Download the pre-built msquicpriv.sys from the msquic team's CI.
          # Building it ourselves with the NuGet WDK (10.0.26100) produces a
          # binary that links against newer cng.lib stubs, causing
          # BCryptOpenAlgorithmProvider(RNG, BCRYPT_PROV_DISPATCH) to fail on
          # Server 2022. The msquic team builds on windows-2022 runners with
          # the system WDK, producing a compatible binary.
          $msquicRef = '${{ inputs.ref }}' 
          if (-not $msquicRef) { $msquicRef = 'main' }

          $kmDir = "${{ inputs.build_dir }}/km"
          if (-not (Test-Path $kmDir)) { New-Item -ItemType Directory -Path $kmDir -Force | Out-Null }

          # Find the latest artifact from msquic CI
          $artifactJson = gh api "repos/microsoft/msquic/actions/artifacts?per_page=1&name=Release-winkernel-windows-2022-x64-schannel" --jq '.artifacts[0] | {id: .id, expired: .expired, created_at: .created_at}' | ConvertFrom-Json
          if (-not $artifactJson -or $artifactJson.expired) {
            throw "No valid msquic kernel artifact found"
          }
          Write-Host "Downloading msquic kernel artifact (id=$($artifactJson.id), created=$($artifactJson.created_at))"

          $zipPath = Join-Path $env:TEMP "msquic-winkernel.zip"
          $extractPath = Join-Path $env:TEMP "msquic-winkernel"
          gh api "repos/microsoft/msquic/actions/artifacts/$($artifactJson.id)/zip" > $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force

          # Find msquicpriv.sys in the extracted artifact
          $msquicPriv = Get-ChildItem -Path $extractPath -Recurse -Filter 'msquicpriv.sys' |
            Where-Object { $_.DirectoryName -notmatch 'kernel\\' } |
            Select-Object -First 1
          if (-not $msquicPriv) {
            # Try any msquicpriv.sys
            $msquicPriv = Get-ChildItem -Path $extractPath -Recurse -Filter 'msquicpriv.sys' | Select-Object -First 1
          }
          if (-not $msquicPriv) {
            throw "msquicpriv.sys not found in downloaded artifact"
          }

          Copy-Item -LiteralPath $msquicPriv.FullName -Destination (Join-Path $kmDir 'msquicpriv.sys') -Force
          Write-Host "Downloaded msquicpriv.sys ($($msquicPriv.Length) bytes) to $kmDir"

          # Cleanup
          Remove-Item $zipPath -Force -ErrorAction SilentlyContinue
          Remove-Item $extractPath -Recurse -Force -ErrorAction SilentlyContinue

      - name: Build kernel driver
        shell: pwsh
        run: |
          # Locate MSVC toolchain via vswhere.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -property installationPath
          $msvcBase = Get-ChildItem "$vsPath\VC\Tools\MSVC" -Directory |
              Sort-Object Name -Descending | Select-Object -First 1
          $cl   = Join-Path $msvcBase.FullName "bin\Hostx64\x64\cl.exe"
          $link = Join-Path $msvcBase.FullName "bin\Hostx64\x64\link.exe"
          $lib  = Join-Path $msvcBase.FullName "bin\Hostx64\x64\lib.exe"
          $crtInc = Join-Path $msvcBase.FullName "include"

          # Resolve NuGet package paths.
          $wdkBase = (Get-ChildItem nuget -Directory -Filter "Microsoft.Windows.WDK*" |
              Select-Object -First 1).FullName
          $sdkBase = (Get-ChildItem nuget -Directory -Filter "Microsoft.Windows.SDK.CPP.10*" |
              Select-Object -First 1).FullName

          $wdkVer = (Get-ChildItem "$wdkBase\c\Include" -Directory | Select-Object -First 1).Name
          $sdkVer = (Get-ChildItem "$sdkBase\c\Include" -Directory | Select-Object -First 1).Name

          $kmInc     = "$wdkBase\c\Include\$wdkVer\km"
          $kmLib     = "$wdkBase\c\Lib\$wdkVer\km\x64"
          $sdkShared = "$sdkBase\c\Include\$sdkVer\shared"
          $sdkUm     = "$sdkBase\c\Include\$sdkVer\um"
          $sdkUcrt   = "$sdkBase\c\Include\$sdkVer\ucrt"

          # MsQuic kernel headers come from FetchContent (already downloaded by CMake).
          $msquicInc = "${{ inputs.build_dir }}\_deps\msquic-src\src\inc"
          $ioctlInc  = "src\backends\msquic_km"

          $outDir = "${{ inputs.build_dir }}\km"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null

          # Generate kernel-mode import library from .def file.
          # Use msquicpriv.sys so we can install side-by-side with the inbox
          # msquic.sys without disturbing system services that depend on it.
          $defContent = "LIBRARY msquicpriv.sys`r`nEXPORTS`r`n    MsQuicOpenVersion`r`n    MsQuicClose"
          $defContent | Out-File -FilePath "$outDir\msquic_km.def" -Encoding ascii
          & $lib /nologo /def:"$outDir\msquic_km.def" /out:"$outDir\msquic.lib" /machine:x64
          if ($LASTEXITCODE -ne 0) { throw "lib.exe failed with exit code $LASTEXITCODE" }

          # Compile.
          $src = "src\backends\msquic_km\driver\winquicecho_km.c"
          & $cl /kernel /nologo /W4 /O2 /GS- /Zi `
              "/Fo$outDir\winquicecho_km.obj" "/Fd$outDir\winquicecho_km.pdb" `
              "/I$crtInc" "/I$kmInc" "/I$sdkShared" "/I$sdkUm" "/I$sdkUcrt" "/I$msquicInc" "/I$ioctlInc" `
              /D _AMD64_ /D AMD64 /D UNICODE /D _UNICODE /D NDEBUG `
              /c $src
          if ($LASTEXITCODE -ne 0) { throw "cl.exe failed with exit code $LASTEXITCODE" }

          # Link.
          & $link /nologo /DRIVER:WDM /SUBSYSTEM:NATIVE /ENTRY:DriverEntry `
              "/OUT:$outDir\winquicecho_km.sys" "/PDB:$outDir\winquicecho_km.pdb" `
              /DEBUG /NODEFAULTLIB `
              "/LIBPATH:$kmLib" "/LIBPATH:$outDir" `
              "$outDir\winquicecho_km.obj" `
              ntoskrnl.lib ntstrsafe.lib msquic.lib bufferoverflowfastfailk.lib
          if ($LASTEXITCODE -ne 0) { throw "link.exe failed with exit code $LASTEXITCODE" }

          Write-Host "Kernel driver built successfully."
          Get-Item "$outDir\winquicecho_km.sys" | Select-Object Name, Length

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: |
            ${{ inputs.build_dir }}/${{ inputs.config }}
            ${{ inputs.build_dir }}/km/winquicecho_km.sys
            ${{ inputs.build_dir }}/km/msquicpriv.sys
