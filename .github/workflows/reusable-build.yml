name: Reusable Build

# SPDX-License-Identifier: MIT
# Copyright (c) 2026 WinQuicEcho contributors

on:
  workflow_call:
    inputs:
      build_dir:
        required: false
        type: string
        default: build
      artifact_name:
        required: false
        type: string
        default: build-artifacts
      config:
        required: false
        type: string
        default: Release
      repository:
        required: false
        type: string
        default: ''
      ref:
        required: false
        type: string
        default: ''

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository (explicit ref)
        if: ${{ inputs.ref != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref }}

      - name: Checkout repository (default ref)
        if: ${{ inputs.ref == '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository || github.repository }}

      - name: Configure CMake
        run: cmake -S . -B ${{ inputs.build_dir }} -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build ${{ inputs.build_dir }} --config ${{ inputs.config }} --parallel

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce

      - name: Install Windows WDK
        shell: pwsh
        run: |
          # The runner has the WDK VS extension but not the full WDK headers.
          # Download and install the WDK NuGet content for MSBuild kernel builds.
          $wdkVersion = '10.0.26100.6584'
          $nugetDir = 'nuget'
          nuget install Microsoft.Windows.WDK.x64 -Version $wdkVersion -OutputDirectory $nugetDir -Verbosity quiet

          $wdkBase = (Get-ChildItem $nugetDir -Directory -Filter 'Microsoft.Windows.WDK*' | Select-Object -First 1).FullName
          $wdkVer = (Get-ChildItem "$wdkBase\c\Include" -Directory | Select-Object -First 1).Name

          # Set environment variables so MSBuild's WindowsDriver targets find the WDK.
          $wdkContentRoot = "$wdkBase\c"
          Write-Host "WDK content root: $wdkContentRoot (version $wdkVer)"
          echo "WDKContentRoot=$wdkContentRoot" >> $env:GITHUB_ENV
          echo "WDKToolRoot=$wdkContentRoot" >> $env:GITHUB_ENV

          # Point rc.exe at the system Windows SDK bin directory so the linker
          # doesn't try to use the NuGet WDK's x86 rc.exe which doesn't exist.
          $sdkBinPath = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\"
          if (-not (Test-Path $sdkBinPath)) {
            # Fall back to whatever SDK version is installed
            $sdkBinPath = (Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Directory | Sort-Object Name -Descending | Select-Object -First 1).FullName + "\"
          }
          Write-Host "Windows SDK bin path: $sdkBinPath"
          echo "WindowsSdkVerBinPath=$sdkBinPath" >> $env:GITHUB_ENV

      - name: Build msquic.sys (kernel-mode)
        shell: pwsh
        run: |
          $msquicSrc = "${{ inputs.build_dir }}/_deps/msquic-src"
          if (-not (Test-Path $msquicSrc)) {
            throw "msquic source not found at $msquicSrc — was CMake FetchContent run?"
          }

          # Find the system Windows SDK bin path (has rc.exe, mc.exe, etc.)
          $sdkBinRoot = "C:\Program Files (x86)\Windows Kits\10\bin"
          $sdkBinVer = (Get-ChildItem $sdkBinRoot -Directory | Where-Object { $_.Name -match '^\d+\.' } | Sort-Object Name -Descending | Select-Object -First 1).Name
          $sdkBinPath = "$sdkBinRoot\$sdkBinVer\"
          Write-Host "Windows SDK bin path: $sdkBinPath"

          Push-Location $msquicSrc
          try {
            # Restore NuGet packages for the kernel solution.
            msbuild msquic.kernel.sln -t:restore /p:RestorePackagesConfig=true /p:Configuration=${{ inputs.config }} /p:Platform=x64
            if ($LASTEXITCODE -ne 0) { throw "NuGet restore failed with exit code $LASTEXITCODE" }

            # Build the kernel-mode msquic.sys library.
            # - Disable code analysis (NuGet WDK analysis plugins don't load reliably)
            # - Override WindowsSdkVerBinPath so MSBuild uses the system rc.exe/mc.exe
            #   instead of the NuGet WDK's x86 path which doesn't ship those tools
            msbuild msquic.kernel.sln /m `
              /p:Configuration=${{ inputs.config }} `
              /p:Platform=x64 `
              /p:RunCodeAnalysis=false `
              /p:CodeAnalysisTreatWarningsAsErrors=false `
              "/p:WindowsSdkVerBinPath=$sdkBinPath"
            if ($LASTEXITCODE -ne 0) { throw "msquic kernel build failed with exit code $LASTEXITCODE" }

            # Locate the built msquic.sys at its predictable output path.
            $msquicSysPath = Join-Path $PWD "artifacts/bin/winkernel/x64_${{ inputs.config }}_schannel/msquic.sys"
            if (-not (Test-Path -LiteralPath $msquicSysPath)) {
              throw "msquic.sys not found at expected path: $msquicSysPath"
            }
            $msquicSys = Get-Item -LiteralPath $msquicSysPath
            Write-Host "Built msquic.sys: $($msquicSys.FullName) ($($msquicSys.Length) bytes)"
          } finally {
            Pop-Location
          }

          # Copy msquic.sys into the WinQuicEcho km output directory.
          $kmDir = "${{ inputs.build_dir }}/km"
          if (-not (Test-Path $kmDir)) { New-Item -ItemType Directory -Path $kmDir -Force | Out-Null }
          Copy-Item -LiteralPath $msquicSys.FullName -Destination (Join-Path $kmDir 'msquic.sys') -Force
          Write-Host "Copied msquic.sys to $kmDir"

      - name: Download WDK NuGet packages
        shell: pwsh
        run: |
          nuget install Microsoft.Windows.WDK.x64 -Version 10.0.26100.6584 -OutputDirectory nuget -Verbosity quiet
          nuget install Microsoft.Windows.SDK.CPP -Version 10.0.26100.1 -OutputDirectory nuget -Verbosity quiet
          Write-Host "WDK and SDK NuGet packages downloaded."

      - name: Build kernel driver
        shell: pwsh
        run: |
          # Locate MSVC toolchain via vswhere.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -property installationPath
          $msvcBase = Get-ChildItem "$vsPath\VC\Tools\MSVC" -Directory |
              Sort-Object Name -Descending | Select-Object -First 1
          $cl   = Join-Path $msvcBase.FullName "bin\Hostx64\x64\cl.exe"
          $link = Join-Path $msvcBase.FullName "bin\Hostx64\x64\link.exe"
          $lib  = Join-Path $msvcBase.FullName "bin\Hostx64\x64\lib.exe"
          $crtInc = Join-Path $msvcBase.FullName "include"

          # Resolve NuGet package paths.
          $wdkBase = (Get-ChildItem nuget -Directory -Filter "Microsoft.Windows.WDK*" |
              Select-Object -First 1).FullName
          $sdkBase = (Get-ChildItem nuget -Directory -Filter "Microsoft.Windows.SDK.CPP.10*" |
              Select-Object -First 1).FullName

          $wdkVer = (Get-ChildItem "$wdkBase\c\Include" -Directory | Select-Object -First 1).Name
          $sdkVer = (Get-ChildItem "$sdkBase\c\Include" -Directory | Select-Object -First 1).Name

          $kmInc     = "$wdkBase\c\Include\$wdkVer\km"
          $kmLib     = "$wdkBase\c\Lib\$wdkVer\km\x64"
          $sdkShared = "$sdkBase\c\Include\$sdkVer\shared"
          $sdkUm     = "$sdkBase\c\Include\$sdkVer\um"
          $sdkUcrt   = "$sdkBase\c\Include\$sdkVer\ucrt"

          # MsQuic kernel headers come from FetchContent (already downloaded by CMake).
          $msquicInc = "${{ inputs.build_dir }}\_deps\msquic-src\src\inc"
          $ioctlInc  = "src\backends\msquic_km"

          $outDir = "${{ inputs.build_dir }}\km"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null

          # Generate kernel-mode import library from .def file.
          $defContent = "LIBRARY msquic.sys`r`nEXPORTS`r`n    MsQuicOpenVersion`r`n    MsQuicClose"
          $defContent | Out-File -FilePath "$outDir\msquic_km.def" -Encoding ascii
          & $lib /nologo /def:"$outDir\msquic_km.def" /out:"$outDir\msquic.lib" /machine:x64
          if ($LASTEXITCODE -ne 0) { throw "lib.exe failed with exit code $LASTEXITCODE" }

          # Compile.
          $src = "src\backends\msquic_km\driver\winquicecho_km.c"
          & $cl /kernel /nologo /W4 /O2 /GS- /Zi `
              "/Fo$outDir\winquicecho_km.obj" "/Fd$outDir\winquicecho_km.pdb" `
              "/I$crtInc" "/I$kmInc" "/I$sdkShared" "/I$sdkUm" "/I$sdkUcrt" "/I$msquicInc" "/I$ioctlInc" `
              /D _AMD64_ /D AMD64 /D UNICODE /D _UNICODE /D NDEBUG `
              /c $src
          if ($LASTEXITCODE -ne 0) { throw "cl.exe failed with exit code $LASTEXITCODE" }

          # Link.
          & $link /nologo /DRIVER:WDM /SUBSYSTEM:NATIVE /ENTRY:DriverEntry `
              "/OUT:$outDir\winquicecho_km.sys" "/PDB:$outDir\winquicecho_km.pdb" `
              /DEBUG /NODEFAULTLIB `
              "/LIBPATH:$kmLib" "/LIBPATH:$outDir" `
              "$outDir\winquicecho_km.obj" `
              ntoskrnl.lib ntstrsafe.lib msquic.lib bufferoverflowfastfailk.lib
          if ($LASTEXITCODE -ne 0) { throw "link.exe failed with exit code $LASTEXITCODE" }

          Write-Host "Kernel driver built successfully."
          Get-Item "$outDir\winquicecho_km.sys" | Select-Object Name, Length

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: |
            ${{ inputs.build_dir }}/${{ inputs.config }}
            ${{ inputs.build_dir }}/km/winquicecho_km.sys
            ${{ inputs.build_dir }}/km/msquic.sys
