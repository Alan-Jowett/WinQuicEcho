name: Reusable Test

# SPDX-License-Identifier: MIT
# Copyright (c) 2026 WinQuicEcho contributors

on:
  workflow_call:
    inputs:
      build_dir:
        required: false
        type: string
        default: build
      artifact_name:
        required: false
        type: string
        default: build-artifacts
      config:
        required: false
        type: string
        default: Release

permissions:
  contents: read
  actions: read

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: downloaded_build

      - name: Verify binaries
        shell: pwsh
        run: |
          $serverPath = "./downloaded_build/${{ inputs.build_dir }}/${{ inputs.config }}/echo_server.exe"
          $clientPath = "./downloaded_build/${{ inputs.build_dir }}/${{ inputs.config }}/echo_client.exe"
          $msquicPath = "./downloaded_build/${{ inputs.build_dir }}/${{ inputs.config }}/msquic.dll"
          foreach ($p in @($serverPath, $clientPath, $msquicPath)) {
            if (-not (Test-Path $p)) {
              Write-Error "Missing: $p"
              exit 1
            }
          }
          Write-Host "All binaries present."

      - name: Binary smoke checks
        shell: pwsh
        run: |
          & "./downloaded_build/${{ inputs.build_dir }}/${{ inputs.config }}/echo_server.exe" --help
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          & "./downloaded_build/${{ inputs.build_dir }}/${{ inputs.config }}/echo_client.exe" --help
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Echo roundtrip integration test
        shell: pwsh
        run: |
          # Run the integration test directly rather than via ctest, since the
          # downloaded artifact's CTestTestfile.cmake has baked-in source paths
          # from the build runner that won't resolve here.
          & ./tests/integration/echo-roundtrip.ps1 `
              -BuildDir "./downloaded_build/${{ inputs.build_dir }}" `
              -Config "${{ inputs.config }}" `
              -Duration 10 `
              -Connections 1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
